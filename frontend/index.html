<!-- Trading Page - TradingView Style -->
<div id="tradingPage" class="hidden container mx-auto px-4">
    <!-- Price Header -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
        <div class="flex justify-between items-center flex-wrap">
            <div>
                <h1 class="text-2xl font-bold text-white" id="currentSymbol">Gold Futures</h1>
                <p class="text-gray-400 text-sm">COMEX · GC1! · <span id="timeframeDisplay">15m</span></p>
            </div>
            <div class="text-right">
                <div class="flex items-center space-x-4">
                    <div>
                        <p class="text-gray-400 text-xs">Bid</p>
                        <p class="text-2xl font-bold text-green-500" id="bidPrice">4,540.7</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs">Ask</p>
                        <p class="text-2xl font-bold text-red-500" id="askPrice">4,541.2</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs">Change</p>
                        <p class="text-lg font-semibold text-red-500" id="changePercent">-0.00%</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Price Action Buttons -->
        <div class="flex space-x-4 mt-4">
            <button onclick="quickSell()" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-bold text-lg transition">
                SELL
            </button>
            <button onclick="quickBuy()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold text-lg transition">
                BUY
            </button>
        </div>
    </div>

    <!-- Chart & Order Section -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <!-- Chart Section (3/4 width) -->
        <div class="lg:col-span-3">
            <div class="bg-gray-800 rounded-2xl p-4">
                <!-- Timeframe Selector -->
                <div class="flex space-x-2 mb-4 border-b border-gray-700 pb-2">
                    <button onclick="setTimeframe('1m')" class="timeframe-btn px-3 py-1 rounded text-sm text-gray-400 hover:text-white">1m</button>
                    <button onclick="setTimeframe('5m')" class="timeframe-btn px-3 py-1 rounded text-sm text-gray-400 hover:text-white">5m</button>
                    <button onclick="setTimeframe('15m')" class="timeframe-btn active px-3 py-1 rounded text-sm bg-blue-600 text-white">15m</button>
                    <button onclick="setTimeframe('1h')" class="timeframe-btn px-3 py-1 rounded text-sm text-gray-400 hover:text-white">1h</button>
                    <button onclick="setTimeframe('4h')" class="timeframe-btn px-3 py-1 rounded text-sm text-gray-400 hover:text-white">4h</button>
                    <button onclick="setTimeframe('1d')" class="timeframe-btn px-3 py-1 rounded text-sm text-gray-400 hover:text-white">1d</button>
                    <div class="flex-1"></div>
                    <div class="flex space-x-1">
                        <button onclick="addIndicator('MA')" class="bg-gray-700 px-2 py-1 rounded text-xs">MA</button>
                        <button onclick="addIndicator('EMA')" class="bg-gray-700 px-2 py-1 rounded text-xs">EMA</button>
                        <button onclick="addIndicator('BB')" class="bg-gray-700 px-2 py-1 rounded text-xs">BB</button>
                        <button onclick="addIndicator('RSI')" class="bg-gray-700 px-2 py-1 rounded text-xs">RSI</button>
                        <button onclick="addIndicator('MACD')" class="bg-gray-700 px-2 py-1 rounded text-xs">MACD</button>
                    </div>
                </div>
                
                <!-- Chart Canvas -->
                <canvas id="tradingChart" height="400"></canvas>
                
                <!-- Indicator Values Panel -->
                <div id="indicatorPanel" class="mt-4 grid grid-cols-5 gap-2 text-center text-xs"></div>
            </div>
        </div>
        
        <!-- Order Panel (1/4 width) -->
        <div>
            <!-- Live Signal -->
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-4 mb-4">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-white text-sm font-semibold">🔥 Live Signal</h3>
                    <span class="text-green-500 text-xs animate-pulse">● LIVE</span>
                </div>
                <div id="liveSignal" class="text-center">
                    <div id="signalType" class="text-3xl font-bold text-green-500">BUY</div>
                    <div class="grid grid-cols-3 gap-2 mt-3">
                        <div><p class="text-gray-500 text-xs">Entry</p><p id="signalEntry" class="text-white font-bold">2350</p></div>
                        <div><p class="text-gray-500 text-xs">SL</p><p id="signalSL" class="text-red-400">2345</p></div>
                        <div><p class="text-gray-500 text-xs">TP</p><p id="signalTP" class="text-green-400">2360</p></div>
                    </div>
                    <div class="mt-2 text-xs text-gray-500">Confidence: <span id="signalConfidence">85</span>%</div>
                </div>
            </div>
            
            <!-- Order Form -->
            <div class="bg-gray-800 rounded-2xl p-4">
                <h3 class="text-white text-sm font-semibold mb-3">Place Order</h3>
                <form id="orderForm">
                    <div class="flex space-x-2 mb-3">
                        <button type="button" onclick="setOrderType('BUY')" id="buyTypeBtn" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-green-600 text-white">BUY</button>
                        <button type="button" onclick="setOrderType('SELL')" id="sellTypeBtn" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-gray-700 text-gray-400">SELL</button>
                    </div>
                    <input type="hidden" id="orderType" value="BUY">
                    <input type="number" id="entryPrice" placeholder="Entry Price" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm mb-2" value="4540.7">
                    <input type="number" id="stopLoss" placeholder="Stop Loss" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm mb-2" value="4535.0">
                    <input type="number" id="takeProfit" placeholder="Take Profit" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm mb-2" value="4550.0">
                    <input type="number" id="quantity" placeholder="Quantity" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm mb-3" value="1">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-semibold transition">
                        PLACE ORDER
                    </button>
                </form>
            </div>
            
            <!-- Quick Stats -->
            <div class="bg-gray-800 rounded-2xl p-4 mt-4">
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div><p class="text-gray-500">24h High</p><p class="text-white">4,549.0</p></div>
                    <div><p class="text-gray-500">24h Low</p><p class="text-white">4,535.0</p></div>
                    <div><p class="text-gray-500">Volume</p><p class="text-white">1.2M</p></div>
                    <div><p class="text-gray-500">Open Interest</p><p class="text-white">85.3K</p></div>
                </div>
            </div>
        </div>
    </div>
</div>
