<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantPro - Trading Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .card-hover { transition: transform 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-900">
    <!-- Navigation -->
    <nav class="bg-gray-900/95 backdrop-blur-md fixed w-full z-50 border-b border-gray-800">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-chart-line text-blue-500 text-2xl"></i>
                    <span class="text-white text-xl font-bold">Quant<span class="text-blue-500">Pro</span></span>
                </div>
                <div class="hidden md:flex space-x-6">
                    <a href="#" onclick="showPage('dashboard')" class="text-gray-300 hover:text-white">Dashboard</a>
                    <a href="#" onclick="showPage('trading')" class="text-gray-300 hover:text-white">Trading</a>
                    <a href="#" onclick="showPage('portfolio')" class="text-gray-300 hover:text-white">Portfolio</a>
                    <a href="#" onclick="showPage('history')" class="text-gray-300 hover:text-white">History</a>
                </div>
                <div class="flex space-x-3">
                    <button onclick="showLogin()" id="loginBtn" class="text-gray-300 hover:text-white px-4 py-2">Login</button>
                    <button onclick="logout()" id="logoutBtn" class="hidden bg-red-600 text-white px-4 py-2 rounded-lg">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="pt-20 pb-8">
        <!-- Dashboard Page -->
        <div id="dashboardPage" class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-gray-800 rounded-2xl p-6 card-hover">
                    <p class="text-gray-400">Total P&L</p>
                    <p class="text-white text-2xl font-bold" id="totalPnL">$0.00</p>
                </div>
                <div class="bg-gray-800 rounded-2xl p-6 card-hover">
                    <p class="text-gray-400">Win Rate</p>
                    <p class="text-white text-2xl font-bold" id="winRate">0%</p>
                </div>
                <div class="bg-gray-800 rounded-2xl p-6 card-hover">
                    <p class="text-gray-400">Open Positions</p>
                    <p class="text-white text-2xl font-bold" id="openPositions">0</p>
                </div>
                <div class="bg-gray-800 rounded-2xl p-6 card-hover">
                    <p class="text-gray-400">Total Trades</p>
                    <p class="text-white text-2xl font-bold" id="totalTrades">0</p>
                </div>
            </div>
            <div class="bg-gray-800 rounded-2xl p-6">
                <canvas id="pnlChart" height="300"></canvas>
            </div>
        </div>

        <!-- Trading Page -->
        <div id="tradingPage" class="hidden container mx-auto px-4">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="bg-gray-800 rounded-2xl p-4">
                        <canvas id="tradingChart" height="400"></canvas>
                        <div class="mt-4 flex space-x-2">
                            <button onclick="addMA()" class="bg-gray-700 px-3 py-1 rounded text-white">MA</button>
                            <button onclick="addRSI()" class="bg-gray-700 px-3 py-1 rounded text-white">RSI</button>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="bg-gray-800 rounded-2xl p-6 mb-6">
                        <h2 class="text-white text-xl mb-4">🔥 Live Signal</h2>
                        <div id="liveSignal" class="bg-gray-700/50 rounded-xl p-6 text-center">
                            <div id="signalType" class="text-4xl font-bold text-green-500 mb-3">BUY</div>
                            <div class="grid grid-cols-3 gap-4">
                                <div><p class="text-gray-400">Entry</p><p id="signalEntry" class="text-white text-xl">2350</p></div>
                                <div><p class="text-gray-400">SL</p><p id="signalSL" class="text-red-500 text-xl">2345</p></div>
                                <div><p class="text-gray-400">TP</p><p id="signalTP" class="text-green-500 text-xl">2360</p></div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-800 rounded-2xl p-6">
                        <h2 class="text-white text-xl mb-4">Place Order</h2>
                        <form id="orderForm">
                            <select id="orderType" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                                <option value="BUY">BUY</option>
                                <option value="SELL">SELL</option>
                            </select>
                            <input type="number" id="entryPrice" placeholder="Entry Price" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                            <input type="number" id="stopLoss" placeholder="Stop Loss" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                            <input type="number" id="takeProfit" placeholder="Take Profit" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                            <input type="number" id="quantity" placeholder="Quantity" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg">Place Order</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Portfolio Page -->
        <div id="portfolioPage" class="hidden container mx-auto px-4">
            <div class="bg-gray-800 rounded-2xl p-6">
                <h2 class="text-white text-xl mb-4">My Portfolio</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-white">
                        <thead><tr class="border-b border-gray-700"><th class="py-3">Symbol</th><th>Type</th><th>Entry</th><th>Qty</th><th>P&L</th><th>Action</th></tr></thead>
                        <tbody id="portfolioTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- History Page -->
        <div id="historyPage" class="hidden container mx-auto px-4">
            <div class="bg-gray-800 rounded-2xl p-6">
                <h2 class="text-white text-xl mb-4">Trade History</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-white">
                        <thead><tr class="border-b border-gray-700"><th>Date</th><th>Symbol</th><th>Type</th><th>Entry</th><th>Exit</th><th>P&L</th></tr></thead>
                        <tbody id="historyTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
        <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full">
            <h2 class="text-white text-2xl mb-6">Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-4">
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg">Login</button>
            </form>
            <p class="text-gray-400 text-center mt-4">New? <button onclick="showSignup()" class="text-blue-500">Sign Up</button></p>
        </div>
    </div>
    
    <div id="signupModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
        <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full">
            <h2 class="text-white text-2xl mb-6">Sign Up</h2>
            <form id="signupForm">
                <input type="text" id="signupName" placeholder="Name" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                <input type="email" id="signupEmail" placeholder="Email" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-3">
                <input type="password" id="signupPassword" placeholder="Password" class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 mb-4">
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;
        let chart;
        
        function showPage(page) {
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('tradingPage').classList.add('hidden');
            document.getElementById('portfolioPage').classList.add('hidden');
            document.getElementById('historyPage').classList.add('hidden');
            document.getElementById(page + 'Page').classList.remove('hidden');
        }
        
        function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function hideLogin() { document.getElementById('loginModal').classList.add('hidden'); }
        function showSignup() { hideLogin(); document.getElementById('signupModal').classList.remove('hidden'); }
        function hideSignup() { document.getElementById('signupModal').classList.add('hidden'); }
        
        function initChart() {
            const ctx = document.getElementById('tradingChart')?.getContext('2d');
            if(ctx) {
                chart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: Array(50).fill(''), datasets: [{ label: 'Price', data: Array(50).fill(2350).map((v,i)=> v + Math.random()*20-10), borderColor: '#3b82f6' }] },
                    options: { responsive: true }
                });
            }
        }
        
        document.getElementById('orderForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            if(!currentUser) { alert('Please login first'); showLogin(); return; }
            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push({ type: document.getElementById('orderType').value, entry: document.getElementById('entryPrice').value, sl: document.getElementById('stopLoss').value, tp: document.getElementById('takeProfit').value, qty: document.getElementById('quantity').value, timestamp: new Date().toISOString() });
            localStorage.setItem('orders', JSON.stringify(orders));
            updatePortfolio(); updateHistory();
            alert('Order placed!');
            e.target.reset();
        });
        
        function updatePortfolio() {
            let orders = JSON.parse(localStorage.getItem('orders') || '[]').filter(o => !o.exitTime);
            let tbody = document.getElementById('portfolioTable');
            if(tbody) { tbody.innerHTML = ''; orders.forEach(o => { tbody.innerHTML += `<tr><td class="py-2">BTCUSD</td><td class="${o.type==='BUY'?'text-green-500':'text-red-500'}">${o.type}</td><td>$${o.entry}</td><td>${o.qty}</td><td>$0</td><td><button onclick="closePosition('${o.timestamp}')" class="bg-red-600 px-2 py-1 rounded">Close</button></td></tr>`; }); }
            document.getElementById('openPositions').innerText = orders.length;
        }
        
        function updateHistory() {
            let orders = JSON.parse(localStorage.getItem('orders') || '[]').filter(o => o.exitTime);
            let tbody = document.getElementById('historyTable');
            if(tbody) { tbody.innerHTML = ''; orders.slice(-10).forEach(o => { tbody.innerHTML += `<tr><td>${new Date(o.exitTime).toLocaleString()}</td><td>BTCUSD</td><td>${o.type}</td><td>$${o.entry}</td><td>$${o.exitPrice||'-'}</td><td>$${o.pnl||0}</td></tr>`; }); }
        }
        
        function closePosition(timestamp) {
            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            let order = orders.find(o => o.timestamp === timestamp);
            if(order) { order.exitTime = new Date(); order.exitPrice = parseFloat(order.entry) + (Math.random()*20-10); order.pnl = ((order.type==='BUY'?order.exitPrice-order.entry:order.entry-order.exitPrice)*order.qty).toFixed(2); localStorage.setItem('orders', JSON.stringify(orders)); updatePortfolio(); updateHistory(); updateDashboard(); alert('Position closed'); }
        }
        
        function updateDashboard() {
            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            let closed = orders.filter(o => o.exitPrice);
            let totalPnL = closed.reduce((s,o)=> s + parseFloat(o.pnl||0), 0);
            let winning = closed.filter(o => parseFloat(o.pnl||0) > 0).length;
            document.getElementById('totalPnL').innerText = `$${totalPnL.toFixed(2)}`;
            document.getElementById('winRate').innerText = closed.length ? ((winning/closed.length)*100).toFixed(1)+'%' : '0%';
            document.getElementById('totalTrades').innerText = orders.length;
        }
        
        function addMA() { alert('MA Indicator Added'); }
        function addRSI() { alert('RSI Indicator Added'); }
        
        document.getElementById('loginForm')?.addEventListener('submit', (e) => { e.preventDefault(); currentUser = { email: document.getElementById('loginEmail').value }; localStorage.setItem('user', JSON.stringify(currentUser)); hideLogin(); updateAuthUI(); showPage('trading'); alert('Logged in'); });
        document.getElementById('signupForm')?.addEventListener('submit', (e) => { e.preventDefault(); currentUser = { email: document.getElementById('signupEmail').value }; localStorage.setItem('user', JSON.stringify(currentUser)); hideSignup(); updateAuthUI(); showPage('trading'); alert('Account created'); });
        function logout() { currentUser = null; localStorage.removeItem('user'); updateAuthUI(); showPage('dashboard'); }
        function updateAuthUI() { document.getElementById('loginBtn').classList.toggle('hidden', !!currentUser); document.getElementById('logoutBtn').classList.toggle('hidden', !currentUser); }
        
        let saved = localStorage.getItem('user'); if(saved) { currentUser = JSON.parse(saved); updateAuthUI(); }
        showPage('dashboard'); initChart();
    </script>
</body>
  </html>
